<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot Kol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #cccccc;
            font-family: monospace;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-y: auto;
            padding-bottom: 50px;
            user-select: none;
            -webkit-user-select: none;
        }

        #header {
            background-color: #111111;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333333;
        }

        #connect-btn {
            background-color: #333333;
            color: #ffffff;
            border: 1px solid #555555;
            padding: 8px 15px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
        }

        .connected #connect-btn {
            background-color: #555555;
        }

        .container {
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .section {
            border: 1px solid #333333;
            background-color: #0a0a0a;
            margin-bottom: 15px;
            padding: 15px;
        }

        .section-title {
            text-align: center;
            border-bottom: 1px solid #333333;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .joysticks-wrapper {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            flex-wrap: wrap;
        }

        .joystick-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .joystick-area {
            position: relative;
            width: 140px;
            height: 140px;
            background-color: #111111;
            border: 1px solid #444444;
            border-radius: 50%;
        }

        .joystick-zone {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
        }

        .joystick-labels {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            color: #888888;
        }

        .slider-row {
            margin-bottom: 20px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: #444444;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 12px;
            background: #aaaaaa;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            border-radius: 0;
        }
    </style>
</head>
<body>
    <div id="header">
        <div style="font-size: 16px;">KONTROL PANELI</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="status" style="font-size: 12px; color: #888;">BEKLIYOR</span>
            <button id="connect-btn">BAGLAN</button>
        </div>
    </div>

    <div class="container">
        <div class="section">
            <div class="section-title">HAREKET SISTEMI</div>
            <div class="joysticks-wrapper">
                <div class="joystick-box">
                    <div style="font-size: 11px; margin-bottom: 10px; color: #888;">ROBOT KOL (S1, S2/S3)</div>
                    <div class="joystick-area">
                        <div id="joy-arm" class="joystick-zone"></div>
                    </div>
                    <div class="joystick-labels" id="arm-label">S1: 90 | S2/S3: 90</div>
                </div>
                <div class="joystick-box">
                    <div style="font-size: 11px; margin-bottom: 10px; color: #888;">ARAC BAZI (R1, R2)</div>
                    <div class="joystick-area">
                        <div id="joy-base" class="joystick-zone"></div>
                    </div>
                    <div class="joystick-labels" id="base-label">R1: 0 | R2: 0</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">HASSAS MOTORLAR</div>
            <div class="slider-row">
                <div class="slider-label"><span>S4 (Dirsek)</span><span id="s4-val">90</span></div>
                <input type="range" id="s4" min="0" max="180" value="90">
            </div>
            <div class="slider-row">
                <div class="slider-label"><span>S5 (Y/A)</span><span id="s5-val">90</span></div>
                <input type="range" id="s5" min="0" max="180" value="90">
            </div>
            <div class="slider-row">
                <div class="slider-label"><span>S6 (Donme)</span><span id="s6-val">90</span></div>
                <input type="range" id="s6" min="0" max="180" value="90">
            </div>
            <div class="slider-row">
                <div class="slider-label"><span>S7 (Pense)</span><span id="s7-val">90</span></div>
                <input type="range" id="s7" min="0" max="180" value="90">
            </div>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let bleDevice = null;
        let bleServer = null;
        let bleCharacteristic = null;
        let isConnected = false;
        let sendInterval = null;
        let lastSentData = "";
        let isWriting = false;

        let state = { s1: 90, s2: 90, s3: 90, s4: 90, s5: 90, s6: 90, s7: 90, r1: 0, r2: 0 };

        const connectBtn = document.getElementById("connect-btn");
        const statusText = document.getElementById("status");
        const header = document.getElementById("header");
        
        const armLabel = document.getElementById("arm-label");
        const baseLabel = document.getElementById("base-label");

        const sliders = ['s4', 's5', 's6', 's7'];
        
        function updateLabels() {
            armLabel.innerText = `S1: ${state.s1} | S2/S3: ${state.s2}`;
            baseLabel.innerText = `R1: ${state.r1} | R2: ${state.r2}`;
        }

        const joyArm = nipplejs.create({
            zone: document.getElementById('joy-arm'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#666',
            size: 100
        });

        joyArm.on('move', (evt, data) => {
            if (!data || !data.vector) return;
            state.s1 = Math.round(90 + (data.vector.x * 90));
            let yVal = Math.round(90 + (data.vector.y * 90));
            state.s2 = yVal;
            state.s3 = yVal;
            state.s1 = Math.min(180, Math.max(0, state.s1));
            state.s2 = Math.min(180, Math.max(0, state.s2));
            state.s3 = Math.min(180, Math.max(0, state.s3));
            updateLabels();
        });

        // Joystick bırakıldığında değerler sıfırlanmaz, son konumda kalır
        joyArm.on('end', () => {
            // Değerler korunuyor - sıfırlama yok
        });

        const joyBase = nipplejs.create({
            zone: document.getElementById('joy-base'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#666',
            size: 100
        });

        joyBase.on('move', (evt, data) => {
            if (!data || !data.vector) return;
            let forward = data.vector.y * 255;
            let right = data.vector.x * 255;
            state.r1 = Math.round(forward + right);
            state.r2 = Math.round(forward - right);
            state.r1 = Math.min(255, Math.max(-255, state.r1));
            state.r2 = Math.min(255, Math.max(-255, state.r2));
            updateLabels();
        });

        // Joystick bırakıldığında değerler sıfırlanmaz, son konumda kalır
        joyBase.on('end', () => {
            // Değerler korunuyor - sıfırlama yok
        });

        sliders.forEach(key => {
            let el = document.getElementById(key);
            let valEl = document.getElementById(key + "-val");
            el.addEventListener('input', (e) => {
                let v = parseInt(e.target.value);
                state[key] = v;
                valEl.innerText = v;
            });
        });

        connectBtn.addEventListener("click", () => {
            if (isConnected) disconnectDevice();
            else connectDevice();
        });

        async function connectDevice() {
            try {
                statusText.innerText = "BAGLANIYOR";
                bleDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                bleServer = await bleDevice.gatt.connect();
                const service = await bleServer.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                isConnected = true;
                header.classList.add("connected");
                statusText.innerText = "BAGLI";
                statusText.style.color = "#fff";
                connectBtn.innerText = "KOPAR";

                if (sendInterval) clearInterval(sendInterval);
                sendInterval = setInterval(sendData, 50);
            } catch (error) {
                statusText.innerText = "HATA";
                setTimeout(() => { if (!isConnected) statusText.innerText = "BEKLIYOR"; }, 2000);
            }
        }

        function disconnectDevice() {
            if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
        }

        function onDisconnected() {
            isConnected = false;
            header.classList.remove("connected");
            statusText.innerText = "BEKLIYOR";
            statusText.style.color = "#888";
            connectBtn.innerText = "BAGLAN";
            if (sendInterval) clearInterval(sendInterval);
        }

        async function sendData() {
            if (!isConnected || !bleCharacteristic || isWriting) return;
            const dataString = `S1:${state.s1},S2:${state.s2},S3:${state.s3},S4:${state.s4},S5:${state.s5},S6:${state.s6},S7:${state.s7},R1:${state.r1},R2:${state.r2}\n`;
            if (dataString === lastSentData) return;
            try {
                isWriting = true;
                let encoder = new TextEncoder();
                let value = encoder.encode(dataString);
                await bleCharacteristic.writeValue(value);
                lastSentData = dataString;
            } catch (error) {
            } finally {
                isWriting = false;
            }
        }
    </script>
</body>
</html>
