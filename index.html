<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot Kol Kontrol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #00bcd4;
            --text-color: #ffffff;
            --text-muted: #888888;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-y: auto;
            padding-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: var(--panel-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin: 0;
        }

        #status {
            font-size: 0.9rem;
            color: #f44336;
            font-weight: bold;
            text-transform: uppercase;
        }

        .connected #status {
            color: #4caf50;
        }

        #connect-btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-transform: uppercase;
        }

        .connected #connect-btn {
            background-color: #f44336;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .panel-title {
            font-size: 1rem;
            margin-bottom: 15px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            text-align: center;
            font-weight: bold;
        }

        .joystick-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 10px auto 20px auto;
            background-color: #111;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        #joystick-zone {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 50%;
            touch-action: none;
        }

        .joystick-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            font-weight: 500;
        }

        .slider-group {
            margin-bottom: 25px;
        }
        
        .slider-group:last-child {
            margin-bottom: 0;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .slider-value {
            font-family: monospace;
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.05rem;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #333;
            border-radius: 4px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        input[type=range]::-moz-range-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #333;
            border-radius: 4px;
        }

        input[type=range]::-moz-range-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <header id="header">
        <h1>ROBOT KOL</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span id="status">BAĞLI DEĞİL</span>
            <button id="connect-btn">BAĞLAN</button>
        </div>
    </header>

    <div class="container">
        <div class="panel">
            <div class="panel-title">Ana Gövde Yönlendirme</div>
            <div class="joystick-container">
                <div id="joystick-zone"></div>
            </div>
            <div class="joystick-labels">
                <div id="s1-label">S1 (Taban): 90°</div>
                <div id="s23-label">S2/S3 (Gövde): 90°</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Hassas Eklem Kontrolü</div>
            
            <div class="slider-group">
                <div class="slider-header">
                    <label>Dirsek (S4)</label>
                    <span class="slider-value" id="s4-val">90°</span>
                </div>
                <input type="range" id="s4" min="0" max="180" value="90">
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label>Bilek Yukarı/Aşağı (S5)</label>
                    <span class="slider-value" id="s5-val">90°</span>
                </div>
                <input type="range" id="s5" min="0" max="180" value="90">
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label>Bilek Dönme (S6)</label>
                    <span class="slider-value" id="s6-val">90°</span>
                </div>
                <input type="range" id="s6" min="0" max="180" value="90">
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label>Tutucu Aç/Kapat (S7)</label>
                    <span class="slider-value" id="s7-val">90°</span>
                </div>
                <input type="range" id="s7" min="0" max="180" value="90">
            </div>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let bleDevice = null;
        let bleServer = null;
        let bleCharacteristic = null;
        let isConnected = false;
        let sendInterval = null;
        let lastSentData = "";
        let isWriting = false;

        let state = { s1: 90, s2: 90, s3: 90, s4: 90, s5: 90, s6: 90, s7: 90 };

        const connectBtn = document.getElementById("connect-btn");
        const statusText = document.getElementById("status");
        const header = document.getElementById("header");
        const s1Label = document.getElementById("s1-label");
        const s23Label = document.getElementById("s23-label");

        const sliders = {
            s4: document.getElementById("s4"),
            s5: document.getElementById("s5"),
            s6: document.getElementById("s6"),
            s7: document.getElementById("s7")
        };
        
        const sliderVals = {
            s4: document.getElementById("s4-val"),
            s5: document.getElementById("s5-val"),
            s6: document.getElementById("s6-val"),
            s7: document.getElementById("s7-val")
        };

        function updateJoystickUI() {
            s1Label.innerText = `S1 (Taban): ${state.s1}°`;
            s23Label.innerText = `S2/S3 (Gövde): ${state.s2}°`;
        }

        const joystickManager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#00bcd4',
            size: 140
        });

        joystickManager.on('move', (evt, data) => {
            if (!data || !data.vector) return;
            
            let x = data.vector.x;
            let y = data.vector.y;

            state.s1 = Math.round(90 + (x * 90));
            let yVal = Math.round(90 + (y * 90));
            state.s2 = yVal;
            state.s3 = yVal;
            
            state.s1 = Math.min(180, Math.max(0, state.s1));
            state.s2 = Math.min(180, Math.max(0, state.s2));
            state.s3 = Math.min(180, Math.max(0, state.s3));

            updateJoystickUI();
        });

        joystickManager.on('end', () => {
            state.s1 = 90;
            state.s2 = 90;
            state.s3 = 90;
            updateJoystickUI();
        });

        ['s4', 's5', 's6', 's7'].forEach(key => {
            sliders[key].addEventListener('input', (e) => {
                let val = parseInt(e.target.value);
                state[key] = val;
                sliderVals[key].innerText = `${val}°`;
            });
        });

        connectBtn.addEventListener("click", () => {
            if (isConnected) {
                disconnectDevice();
            } else {
                connectDevice();
            }
        });

        async function connectDevice() {
            try {
                statusText.innerText = "BAĞLANIYOR...";
                
                bleDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

                bleServer = await bleDevice.gatt.connect();
                const service = await bleServer.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                isConnected = true;
                header.classList.add("connected");
                statusText.innerText = "BAĞLI";
                connectBtn.innerText = "KOPAR";

                if (sendInterval) clearInterval(sendInterval);
                sendInterval = setInterval(sendData, 50);

            } catch (error) {
                statusText.innerText = "BAĞLANTI HATASI";
                setTimeout(() => { if (!isConnected) statusText.innerText = "BAĞLI DEĞİL"; }, 2000);
            }
        }

        function disconnectDevice() {
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
            }
        }

        function onDisconnected() {
            isConnected = false;
            header.classList.remove("connected");
            statusText.innerText = "BAĞLI DEĞİL";
            connectBtn.innerText = "BAĞLAN";
            if (sendInterval) {
                clearInterval(sendInterval);
            }
        }

        async function sendData() {
            if (!isConnected || !bleCharacteristic || isWriting) return;

            const dataString = `S1:${state.s1},S2:${state.s2},S3:${state.s3},S4:${state.s4},S5:${state.s5},S6:${state.s6},S7:${state.s7},R1:0,R2:0\n`;
            
            if (dataString === lastSentData) return;

            try {
                isWriting = true;
                let encoder = new TextEncoder();
                let value = encoder.encode(dataString);
                await bleCharacteristic.writeValue(value);
                lastSentData = dataString;
            } catch (error) {
            } finally {
                isWriting = false;
            }
        }
    </script>
</body>
</html>
